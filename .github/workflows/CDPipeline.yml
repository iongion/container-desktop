name: CDPipeline

on:
  workflow_dispatch:
    inputs:
      git-ref:
        description: "Git ref"
        required: true
        default: "latest"
      stage:
        description: "Stage"
        required: true
        default: "production"
      target:
        description: "Target"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - linux
          - macos
          - windows

jobs:
  bundle:
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(github.event.inputs.target == 'all' && '["linux","macos","windows"]' || format('["{0}"]', github.event.inputs.target)) }}
        include:
          - target: linux
            os: ubuntu-latest
          - target: macos
            os: macos-latest
          - target: windows
            os: windows-latest

    runs-on: ${{ matrix.os }}

    env:
      CI: true
      CD: true
      NODE_ENV: ${{github.event.inputs.stage}}
      ENVIRONMENT: ${{github.event.inputs.stage}}
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Clone Repository (latest)
        uses: actions/checkout@v6
        if: github.event.inputs.git-ref == 'latest'
      - name: Clone Repository (custom ref)
        uses: actions/checkout@v6
        if: github.event.inputs.git-ref != 'latest'
        with:
          ref: ${{ github.event.inputs.git-ref }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.16.0"
          registry-url: "https://npm.pkg.github.com"
      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python tools
        run: python -m pip install --upgrade pip invoke
      - name: Use Go
        if: matrix.target == 'windows'
        uses: actions/setup-go@v6
        with:
          go-version-file: support/container-desktop-relay/go.mod
      - name: Prepare app ${{github.event.inputs.stage}} ${{matrix.target}}
        run: inv prepare
      - name: Build ${{github.event.inputs.stage}} ${{matrix.target}}
        run: inv build
        env:
          TARGET: ${{matrix.target}}
      - name: Bundle ${{github.event.inputs.stage}} ${{matrix.target}}
        run: inv bundle
        env:
          TARGET: ${{matrix.target}}
      - name: Checksum ${{github.event.inputs.stage}} ${{matrix.target}} artifacts
        run: inv checksums
      - name: Publish ${{github.event.inputs.stage}} ${{matrix.target}} artifacts
        uses: actions/upload-artifact@v7
        with:
          name: container-desktop-${{ matrix.target }}
          path: release/container-desktop*
          if-no-files-found: error
