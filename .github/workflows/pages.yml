name: Deploy website to GitHub Pages

# Publishes the static site in website/ to GitHub Pages via GitHub Actions
# (replaces the classic "deploy from branch /docs" source so the folder can be
# named freely). The custom domain is preserved through website/CNAME.
#
# Pages deploys ONLY as part of a release: CDPipeline.Tauri.yml's publish-pages job runs
# this content after the release assets are published. There is intentionally no
# push trigger, so merging website/doc changes to main does not deploy on its own
# — cut a release, or run this workflow manually below, to publish them.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload website artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          # Per-attempt name — see CDPipeline.Tauri.yml's publish-pages for the full why:
          # re-running a single deploy job would otherwise stack a duplicate
          # github-pages artifact and deploy-pages aborts on >1 of the same name.
          name: github-pages-${{ github.run_attempt }}
          path: website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
          timeout: 1200000 # 20 min — ride out slow GitHub Pages deploys (default 10)
