name: Deploy website to GitHub Pages

# Publishes the static site in website/ to GitHub Pages via GitHub Actions
# (replaces the classic "deploy from branch /docs" source so the folder can be
# named freely). The custom domain is preserved through website/CNAME.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
